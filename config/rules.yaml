version: mvp-0.1
model_version: rules-plus-llm-mvp-0.1

thresholds:
  min_average_turnover: 50000000
  min_average_volume: 50000
  overheat_20d_return: 0.25
  exclude_20d_return: 0.45
  severe_drawdown_from_high: -0.25
  max_missing_fields_before_avoid: 6

outcome:
  win_return_threshold: 0.03
  lose_return_threshold: -0.03

scoring_weights:
  earnings_growth: 20
  progress_revision: 20
  low_overheat: 15
  historical_reaction: 15
  liquidity: 10
  theme: 10
  low_risk: 10

recommendation:
  minimum_post_score: 70
  max_recommendations: 3

llm:
  model: gpt-4.1-mini
  max_retries: 2
  timeout_seconds: 45

