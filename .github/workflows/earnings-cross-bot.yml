name: Earnings Cross Manager Operations

on:
  schedule:
    - cron: "*/5 * * * *"        # TDnet
    - cron: "5 23 * * 0-4"       # 08:05 JST fundamentals
    - cron: "20 23 * * 0-4"      # 08:20 JST market brief
    - cron: "30 23 * * 0-4"      # 08:30 JST earnings candidates
    - cron: "30 0 * * 1-5"       # 09:30 JST watchlist open
    - cron: "45 6 * * 1-5"       # 15:45 JST evaluation
    - cron: "0 7 * * 1-5"        # 16:00 JST watchlist close
    - cron: "0 9 * * 5"          # 18:00 JST weekly review
  workflow_dispatch:
    inputs:
      job:
        description: "Operation to run"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evaluate
          - weekly
          - learn
          - slack-test
          - market-brief
          - tdnet
          - watchlist-open
          - watchlist-close
          - fundamentals
          - refresh-manager
          - build-native

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TIMEZONE: Asia/Tokyo

permissions:
  contents: write

concurrency:
  group: earnings-cross-manager-operations
  cancel-in-progress: false

jobs:
  operate:
    if: github.event_name != 'workflow_dispatch' || inputs.job != 'build-native'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Select operation
        id: task
        env:
          REQUESTED_JOB: ${{ inputs.job }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            task="$REQUESTED_JOB"
          else
            case "$EVENT_SCHEDULE" in
              "*/5 * * * *") task="tdnet" ;;
              "5 23 * * 0-4") task="fundamentals" ;;
              "20 23 * * 0-4") task="market-brief" ;;
              "30 23 * * 0-4") task="morning" ;;
              "30 0 * * 1-5") task="watchlist-open" ;;
              "45 6 * * 1-5") task="evaluate" ;;
              "0 7 * * 1-5") task="watchlist-close" ;;
              "0 9 * * 5") task="weekly" ;;
              *) task="refresh-manager" ;;
            esac
          fi
          echo "task=$task" >> "$GITHUB_OUTPUT"

      - name: Install earnings dependencies
        if: github.event_name == 'workflow_dispatch' || contains(fromJSON('["morning","evaluate","weekly","learn","slack-test"]'), steps.task.outputs.task)
        run: python3 -m pip install -r requirements.txt

      - name: Run unit tests
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_OUTPUT: ""
        run: |
          python3 -m unittest discover -s tests -q
          cd market_intelligence
          python3 -m unittest discover -s tests -q

      - name: Run earnings operation
        if: contains(fromJSON('["morning","evaluate","weekly","learn","slack-test"]'), steps.task.outputs.task)
        env:
          JQUANTS_EMAIL: ${{ secrets.JQUANTS_EMAIL }}
          JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TASK: ${{ steps.task.outputs.task }}
        run: |
          case "$TASK" in
            morning) python3 -m src.main_morning ${{ github.event_name == 'workflow_dispatch' && '--force-post' || '' }} ;;
            evaluate) python3 -m src.main_evaluate ;;
            weekly) python3 -m src.main_weekly_review ;;
            learn) python3 -m src.main_learn ;;
            slack-test) python3 -m src.main_slack_test ;;
          esac

      - name: Run market intelligence operation
        id: market
        if: contains(fromJSON('["market-brief","tdnet","watchlist-open","watchlist-close","fundamentals"]'), steps.task.outputs.task)
        working-directory: market_intelligence
        env:
          TASK: ${{ steps.task.outputs.task }}
          EDINETDB_API_KEY: ${{ secrets.EDINETDB_API_KEY }}
          SLACK_CHANNEL_ID: C0ASFHVU94L
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          case "$TASK" in
            market-brief) python3 scripts/morning_brief.py --manager-only ;;
            tdnet) python3 scripts/tdnet_slack_alert.py --state docs/data/tdnet.json ;;
            watchlist-open) python3 scripts/watchlist_snapshot.py --phase open ;;
            watchlist-close) python3 scripts/watchlist_snapshot.py --phase close ;;
            fundamentals)
              if [ -n "$EDINETDB_API_KEY" ]; then python3 scripts/fundamentals_edinetdb_rankings.py; fi
              ;;
          esac

      - name: Post market message to Slack
        if: steps.task.outputs.task == 'market-brief'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: ${{ steps.market.outputs.message || steps.market.outputs.slack_message }}
        run: |
          python3 -c 'import json,os,urllib.request; u=os.getenv("SLACK_WEBHOOK_URL","").strip(); m=os.getenv("SLACK_MESSAGE","").strip(); req=urllib.request.Request(u,data=json.dumps({"text":m},ensure_ascii=False).encode(),headers={"Content-Type":"application/json"}); urllib.request.urlopen(req,timeout=20).read() if u and m else None'

      - name: Build Manager snapshot
        run: python3 -m src.main_dashboard

      - name: Persist operational data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/earnings_cross_bot.db data/lessons.jsonl data/learning_profile.json data/manager_snapshot.json config/rules_suggestion.yaml market_intelligence/docs/data || true
          git diff --cached --quiet || git commit -m "Update Earnings Cross Manager data"
          git push

  build-native:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'build-native'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build desktop application
        run: |
          ./scripts/build_native_app.sh
          codesign --force --deep --sign - build/EarningsCrossManager.app
          ditto -c -k --keepParent build/EarningsCrossManager.app build/EarningsCrossManager.zip
      - name: Upload desktop application
        uses: actions/upload-artifact@v4
        with:
          name: EarningsCrossManager-macOS
          path: build/EarningsCrossManager.zip
          if-no-files-found: error
          retention-days: 30
